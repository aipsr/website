<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>REDES-IA logo preview</title>
  <link rel="stylesheet" href="../web/redes-ia-logo.css" />
  <style>
    body { margin: 0; font-family: Inter, Aptos, system-ui, sans-serif; background: var(--redes-ia-off-white); color: var(--redes-ia-carbon); }
    main { max-width: 1080px; margin: 0 auto; padding: 48px 24px; }
    section { margin-bottom: 40px; padding: 28px; border: 1px solid rgba(60,93,114,.2); border-radius: 16px; background: white; }
    h1, h2 { color: var(--redes-ia-blue); }
    img { max-width: 100%; height: auto; display: block; }
    .dark { background: var(--redes-ia-carbon); }
    .icon { width: 220px; }
  </style>
</head>
<body>
<main>
  <h1>REDES-IA logo preview</h1>
  <section><h2>Primary horizontal</h2><img src="../svg/redes-ia-primary-horizontal.svg" alt="REDES-IA primary horizontal logo"></section>
  <section><h2>Compact horizontal</h2><img src="../svg/redes-ia-horizontal-compact.svg" alt="REDES-IA compact horizontal logo"></section>
  <section><h2>English secondary</h2><img src="../svg/redes-ia-secondary-english.svg" alt="REDES-IA secondary English logo"></section>
  <section><h2>Icon</h2><img class="icon" src="../svg/redes-ia-icon.svg" alt="REDES-IA icon"></section>
  <section class="dark"><h2 style="color:white">Reversed</h2><img src="../svg/redes-ia-reversed-dark.svg" alt="REDES-IA reversed logo"></section>
</main>
</body>
</html>
